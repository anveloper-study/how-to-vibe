<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>콘텐츠 등록</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #f4f4f8;
        font-family: "Noto Sans KR", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div
      class="slide-container"
      style="
        position: relative;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        background: linear-gradient(135deg, #ffffff 0%, #f0eef5 100%);
      "
    >
      <!-- Background Glow -->
      <div
        style="
          position: absolute;
          left: 300px;
          top: 200px;
          width: 400px;
          height: 400px;
          background-color: #6c5ce7;
          border-radius: 50%;
          filter: blur(200px);
          opacity: 0.05;
          z-index: 1;
        "
      ></div>
      <!-- Top Accent Line -->
      <div
        style="
          position: absolute;
          left: 80px;
          top: 50px;
          width: 60px;
          height: 4px;
          background-color: #fe2a80;
          border-radius: 2px;
          z-index: 1;
        "
      ></div>
      <!-- Title -->
      <div
        style="
          position: absolute;
          left: 80px;
          top: 75px;
          width: 700px;
          height: 50px;
          z-index: 10;
        "
      >
        <p
          style="
            margin: 0;
            font-size: 36px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -1px;
          "
        >
          콘텐츠 등록
          <span style="color: #a1a1aa; font-weight: 400; font-size: 30px; padding-left: 10px">— 대표 이미지 & 영상</span>
        </p>
      </div>
      <!-- Two screenshots side by side -->
      <div
        style="
          position: absolute;
          left: 80px;
          top: 155px;
          width: 560px;
          height: 400px;
          z-index: 10;
          border-radius: 16px;
          overflow: hidden;
          box-shadow: 0 8px 40px rgba(0, 0, 0, 0.1), 0 2px 8px rgba(0, 0, 0, 0.06);
        "
      >
        <img
          src="004.png"
          style="width: 100%; height: 100%; object-fit: cover; object-position: center;"
        />
      </div>
      <div
        style="
          position: absolute;
          left: 660px;
          top: 155px;
          width: 540px;
          height: 400px;
          z-index: 10;
          border-radius: 16px;
          overflow: hidden;
          box-shadow: 0 8px 40px rgba(0, 0, 0, 0.1), 0 2px 8px rgba(0, 0, 0, 0.06);
        "
      >
        <img
          src="005.png"
          style="width: 100%; height: 100%; object-fit: cover; object-position: center;"
        />
      </div>
      <!-- Labels under screenshots -->
      <div
        style="
          position: absolute;
          left: 80px;
          top: 575px;
          width: 560px;
          z-index: 10;
        "
      >
        <div style="display: flex; align-items: center; gap: 10px;">
          <div style="width: 32px; height: 32px; background: rgba(254,42,128,0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <span style="font-size: 14px; color: #fe2a80; font-weight: 900;">1</span>
          </div>
          <div>
            <p style="margin: 0; font-size: 18px; color: #1a1a2e; font-weight: 600;">콘텐츠 등록하기</p>
            <p style="margin: 3px 0 0 0; font-size: 13px; color: #71717a;">GitHub README에서 이미지와 영상 URL을 자동으로 가져오기</p>
          </div>
        </div>
      </div>
      <div
        style="
          position: absolute;
          left: 660px;
          top: 575px;
          width: 540px;
          z-index: 10;
        "
      >
        <div style="display: flex; align-items: center; gap: 10px;">
          <div style="width: 32px; height: 32px; background: rgba(0,184,148,0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <span style="font-size: 14px; color: #00b894; font-weight: 900;">2</span>
          </div>
          <div>
            <p style="margin: 0; font-size: 18px; color: #1a1a2e; font-weight: 600;">등록 완료 상태</p>
            <p style="margin: 3px 0 0 0; font-size: 13px; color: #71717a;">대표 이미지와 YouTube 영상이 체크 표시로 확인됨</p>
          </div>
        </div>
      </div>
      <!-- Bottom flow hint -->
      <div
        style="
          position: absolute;
          left: 280px;
          top: 650px;
          width: 720px;
          height: 40px;
          z-index: 10;
        "
      >
        <div
          style="
            background: rgba(254,42,128,0.05);
            border: 1px solid rgba(254,42,128,0.15);
            border-radius: 30px;
            padding: 8px 24px;
            text-align: center;
          "
        >
          <p style="margin: 0; font-size: 14px; color: #52525b;">
            README의 이미지 URL → <span style="color: #fe2a80; font-weight: 700;">자동 파싱</span> →
            대표 이미지로 등록 →
            <span style="color: #fe2a80; font-weight: 700;">갤러리 카드에 노출</span>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
