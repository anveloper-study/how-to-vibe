<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>프로젝트 인증</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #f4f4f8;
        font-family: "Noto Sans KR", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div
      class="slide-container"
      style="
        position: relative;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        background: linear-gradient(135deg, #ffffff 0%, #f0eef5 100%);
      "
    >
      <!-- Background Glow -->
      <div
        style="
          position: absolute;
          left: 200px;
          top: 300px;
          width: 400px;
          height: 400px;
          background-color: #6c5ce7;
          border-radius: 50%;
          filter: blur(200px);
          opacity: 0.06;
          z-index: 1;
        "
      ></div>
      <!-- Top Accent Line -->
      <div
        style="
          position: absolute;
          left: 80px;
          top: 50px;
          width: 60px;
          height: 4px;
          background-color: #fe2a80;
          border-radius: 2px;
          z-index: 1;
        "
      ></div>
      <!-- Title -->
      <div
        style="
          position: absolute;
          left: 80px;
          top: 75px;
          width: 600px;
          height: 50px;
          z-index: 10;
        "
      >
        <p
          style="
            margin: 0;
            font-size: 36px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -1px;
          "
        >
          프로젝트 정보 수정
          <span style="color: #a1a1aa; font-weight: 400; font-size: 30px; padding-left: 10px">— 본인 인증</span>
        </p>
      </div>
      <!-- Left Description -->
      <div
        style="
          position: absolute;
          left: 80px;
          top: 180px;
          width: 440px;
          z-index: 10;
        "
      >
        <!-- Step Card -->
        <div
          style="
            background: white;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.05);
            border-left: 4px solid #fe2a80;
          "
        >
          <p style="margin: 0 0 12px 0; font-size: 26px; color: #1a1a2e; font-weight: 700; letter-spacing: -0.5px; line-height: 1.4;">
            참가 신청 시 등록한<br/>이메일 & 전화번호로 인증
          </p>
          <p style="margin: 0; font-size: 16px; color: #71717a; line-height: 1.7; word-break: keep-all;">
            프로젝트 정보는 팀원만 수정할 수 있도록 본인 인증 절차를 거칩니다. 전화번호 뒤 4자리로 간편 인증.
          </p>
        </div>
        <!-- Flow Arrow -->
        <div style="padding: 20px 0; text-align: center;">
          <svg width="28" height="28" fill="none" stroke="#fe2a80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <polyline points="19 12 12 19 5 12"></polyline>
          </svg>
        </div>
        <!-- Next Step Hint -->
        <div
          style="
            background: rgba(254, 42, 128, 0.05);
            border: 1px solid rgba(254, 42, 128, 0.15);
            border-radius: 16px;
            padding: 20px 24px;
          "
        >
          <p style="margin: 0; font-size: 16px; color: #52525b; font-weight: 500;">
            인증 성공 → <span style="color: #fe2a80; font-weight: 700;">프로젝트 편집 모드</span> 진입
          </p>
        </div>
      </div>
      <!-- Screenshot Image -->
      <div
        style="
          position: absolute;
          left: 580px;
          top: 140px;
          width: 620px;
          height: 480px;
          z-index: 10;
          border-radius: 16px;
          overflow: hidden;
          box-shadow: 0 8px 40px rgba(0, 0, 0, 0.1), 0 2px 8px rgba(0, 0, 0, 0.06);
        "
      >
        <img
          src="002.webp"
          style="width: 100%; height: 100%; object-fit: cover; object-position: center;"
        />
      </div>
      <!-- Footer -->
      <div
        style="
          position: absolute;
          left: 80px;
          top: 660px;
          width: 400px;
          height: 30px;
          z-index: 10;
        "
      >
        <p style="margin: 0; font-size: 14px; color: #a1a1aa;"></p>
      </div>
      <!-- Corner Dot -->
      <div
        style="
          position: absolute;
          left: 1200px;
          top: 660px;
          width: 8px;
          height: 8px;
          background-color: rgba(108, 92, 231, 0.3);
          border-radius: 50%;
          z-index: 1;
        "
      ></div>
    </div>
  </body>
</html>
