<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>프로젝트 갤러리 메인</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #f4f4f8;
        font-family: "Noto Sans KR", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div
      class="slide-container"
      style="
        position: relative;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        background: linear-gradient(135deg, #ffffff 0%, #f0eef5 100%);
      "
    >
      <!-- Background Glow -->
      <div
        style="
          position: absolute;
          left: 800px;
          top: 100px;
          width: 400px;
          height: 400px;
          background-color: #fe2a80;
          border-radius: 50%;
          filter: blur(200px);
          opacity: 0.06;
          z-index: 1;
        "
      ></div>
      <!-- Top Accent Line -->
      <div
        style="
          position: absolute;
          left: 80px;
          top: 50px;
          width: 60px;
          height: 4px;
          background-color: #fe2a80;
          border-radius: 2px;
          z-index: 1;
        "
      ></div>
      <!-- Title -->
      <div
        style="
          position: absolute;
          left: 80px;
          top: 75px;
          width: 500px;
          height: 50px;
          z-index: 10;
        "
      >
        <p
          style="
            margin: 0;
            font-size: 36px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -1px;
          "
        >
          프로젝트 정보 수정
          <span style="color: #a1a1aa; font-weight: 400; font-size: 30px; padding-left: 10px">— 여기서 시작</span>
        </p>
      </div>
      <!-- Screenshot Image -->
      <div
        style="
          position: absolute;
          left: 80px;
          top: 150px;
          width: 720px;
          height: 440px;
          z-index: 10;
          border-radius: 16px;
          overflow: hidden;
          box-shadow: 0 8px 40px rgba(0, 0, 0, 0.1), 0 2px 8px rgba(0, 0, 0, 0.06);
        "
      >
        <img
          src="001.png"
          style="width: 100%; height: 100%; object-fit: cover; object-position: top;"
        />
      </div>
      <!-- Description Card -->
      <div
        style="
          position: absolute;
          left: 840px;
          top: 150px;
          width: 360px;
          height: 440px;
          z-index: 10;
        "
      >
        <!-- Click Guide -->
        <div
          style="
            background: rgba(254,42,128,0.04);
            border: 1px solid rgba(254,42,128,0.2);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
          "
        >
          <p style="margin: 0; font-size: 18px; color: #1a1a2e; font-weight: 600; line-height: 1.5;">
            우측 상단의<br/><span style="color: #fe2a80;">"프로젝트 정보 수정"</span> 버튼 클릭
          </p>
          <p style="margin: 8px 0 0 0; font-size: 14px; color: #71717a; line-height: 1.6;">
            갤러리 우측 상단에 있는 수정 버튼을 눌러주세요
          </p>
        </div>
      </div>
      <!-- Footer -->
      <div
        style="
          position: absolute;
          left: 80px;
          top: 620px;
          width: 400px;
          height: 30px;
          z-index: 10;
        "
      >
        <p style="margin: 0; font-size: 14px; color: #a1a1aa;">
          https://ttalkkkakthon.vibecodingclub.kr/gallery
        </p>
      </div>
      <!-- Corner Dot -->
      <div
        style="
          position: absolute;
          left: 1200px;
          top: 660px;
          width: 8px;
          height: 8px;
          background-color: rgba(254, 42, 128, 0.3);
          border-radius: 50%;
          z-index: 1;
        "
      ></div>
    </div>
  </body>
</html>
