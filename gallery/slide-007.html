<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>개발 기록을 남기자</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #f4f4f8;
        font-family: "Noto Sans KR", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div
      class="slide-container"
      style="
        position: relative;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        background: linear-gradient(135deg, #ffffff 0%, #f0eef5 100%);
      "
    >
      <!-- Background Glow 1 -->
      <div
        style="
          position: absolute;
          left: 400px;
          top: 100px;
          width: 500px;
          height: 500px;
          background-color: #fe2a80;
          border-radius: 50%;
          filter: blur(220px);
          opacity: 0.07;
          z-index: 1;
        "
      ></div>
      <!-- Background Glow 2 -->
      <div
        style="
          position: absolute;
          left: 800px;
          top: 350px;
          width: 300px;
          height: 300px;
          background-color: #6c5ce7;
          border-radius: 50%;
          filter: blur(180px);
          opacity: 0.05;
          z-index: 1;
        "
      ></div>
      <!-- Outer Decorative Frame -->
      <div
        style="
          position: absolute;
          left: 40px;
          top: 40px;
          width: 1200px;
          height: 640px;
          border: 1px solid rgba(0, 0, 0, 0.06);
          border-radius: 24px;
          z-index: 1;
        "
      ></div>
      <!-- Corner Dot Top Left -->
      <div
        style="
          position: absolute;
          left: 80px;
          top: 80px;
          width: 8px;
          height: 8px;
          background-color: #fe2a80;
          border-radius: 50%;
          z-index: 1;
        "
      ></div>
      <!-- Badge -->
      <div
        style="
          position: absolute;
          left: 340px;
          top: 170px;
          width: 600px;
          height: 40px;
          z-index: 10;
          text-align: center;
        "
      >
        <p
          style="
            margin: 0;
            display: inline-block;
            padding: 6px 18px;
            border: 1px solid rgba(254, 42, 128, 0.4);
            border-radius: 20px;
            color: #fe2a80;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            background-color: rgba(254, 42, 128, 0.06);
          "
        >
          LAST BUT NOT LEAST
        </p>
      </div>
      <!-- Main Title -->
      <div
        style="
          position: absolute;
          left: 140px;
          top: 250px;
          width: 1000px;
          height: 120px;
          z-index: 10;
        "
      >
        <p
          style="
            margin: 0;
            text-align: center;
            font-size: 64px;
            font-weight: 900;
            color: #1a1a2e;
            letter-spacing: -3px;
            line-height: 1.3;
          "
        >
          이번 기회에 <span style="color: #fe2a80;">GitHub</span>에<br/>
          <span style="color: #6c5ce7;">개발 기록</span>을 남겨보세요
        </p>
      </div>
      <!-- Subtitle -->
      <div
        style="
          position: absolute;
          left: 240px;
          top: 430px;
          width: 800px;
          height: 40px;
          z-index: 10;
        "
      >
        <p
          style="
            margin: 0;
            text-align: center;
            font-size: 22px;
            font-weight: 400;
            color: #71717a;
            letter-spacing: -0.5px;
            line-height: 1.6;
          "
        >
          해커톤에서 만든 프로젝트, 시간이 지나면 기억이 흐려집니다
        </p>
      </div>
      <!-- Separator -->
      <div
        style="
          position: absolute;
          left: 610px;
          top: 500px;
          width: 60px;
          height: 3px;
          background: linear-gradient(90deg, #fe2a80, #6c5ce7);
          border-radius: 2px;
          z-index: 1;
        "
      ></div>
      <!-- Checklist Cards -->
      <div
        style="
          position: absolute;
          left: 200px;
          top: 530px;
          width: 880px;
          z-index: 10;
          display: flex;
          gap: 16px;
        "
      >
        <div
          style="
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            text-align: center;
          "
        >
          <p style="margin: 0 0 6px 0; font-size: 24px;">📸</p>
          <p style="margin: 0 0 4px 0; font-size: 16px; color: #1a1a2e; font-weight: 600;">대표 이미지 등록</p>
          <p style="margin: 0; font-size: 13px; color: #a1a1aa;">프로젝트의 첫인상</p>
        </div>
        <div
          style="
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            text-align: center;
          "
        >
          <p style="margin: 0 0 6px 0; font-size: 24px;">🎬</p>
          <p style="margin: 0 0 4px 0; font-size: 16px; color: #1a1a2e; font-weight: 600;">데모 영상 링크</p>
          <p style="margin: 0; font-size: 13px; color: #a1a1aa;">동작하는 모습을 보여주세요</p>
        </div>
        <div
          style="
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            text-align: center;
          "
        >
          <p style="margin: 0 0 6px 0; font-size: 24px;">📝</p>
          <p style="margin: 0 0 4px 0; font-size: 16px; color: #1a1a2e; font-weight: 600;">README 정리</p>
          <p style="margin: 0; font-size: 13px; color: #a1a1aa;">미래의 나를 위한 기록</p>
        </div>
      </div>
      <!-- Bottom Accent -->
      <div
        style="
          position: absolute;
          left: 80px;
          top: 660px;
          width: 40px;
          height: 4px;
          background: linear-gradient(90deg, #fe2a80, #6c5ce7);
          border-radius: 2px;
          z-index: 1;
        "
      ></div>
      <!-- Corner Dot Bottom Right -->
      <div
        style="
          position: absolute;
          left: 1200px;
          top: 660px;
          width: 8px;
          height: 8px;
          background-color: rgba(108, 92, 231, 0.3);
          border-radius: 50%;
          z-index: 1;
        "
      ></div>
    </div>
  </body>
</html>
