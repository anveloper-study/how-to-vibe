<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>제발요~</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #f4f4f8;
        font-family: "Noto Sans KR", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div
      class="slide-container"
      style="
        position: relative;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        background: linear-gradient(135deg, #ffffff 0%, #f0eef5 100%);
      "
    >
      <!-- Background Glow -->
      <div
        style="
          position: absolute;
          left: 440px;
          top: 160px;
          width: 400px;
          height: 400px;
          background-color: #fe2a80;
          border-radius: 50%;
          filter: blur(200px);
          opacity: 0.1;
          z-index: 1;
        "
      ></div>
      <!-- Main Text -->
      <div
        style="
          position: absolute;
          left: 50%;
          top: 50%;
          width: 1000px;
          z-index: 10;
          transform: translate(-50%, -50%);
        "
      >
        <p
          style="
            margin: 0;
            text-align: center;
            font-size: 120px;
            font-weight: 900;
            color: #fe2a80;
            letter-spacing: -4px;
            line-height: 1.2;
            display:flex;
            justify-content: center;
            align-items: center;
          "
        >
          제발요~
        </p>
      </div>
      <!-- Bottom Accent -->
      <div
        style="
          position: absolute;
          left: 80px;
          top: 660px;
          width: 40px;
          height: 4px;
          background: linear-gradient(90deg, #fe2a80, #6c5ce7);
          border-radius: 2px;
          z-index: 1;
        "
      ></div>
    </div>
  </body>
</html>
