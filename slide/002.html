<!doctype html>

<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>오늘의 목표</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #000000;
        font-family: "Noto Sans KR", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div
      class="slide-container"
      style="
        position: relative;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        background-color: #0a0a0a;
      "
    >
      <!-- Background Ambient Glow -->
      <div
        data-object="true"
        data-object-type="shape"
        style="
          position: absolute;
          left: 340px;
          top: 160px;
          width: 600px;
          height: 400px;
          background-color: #fe2a80;
          border-radius: 50%;
          filter: blur(200px);
          opacity: 0.12;
          z-index: 1;
        "
      ></div>
      <!-- Top Accent Line -->
      <div
        data-object="true"
        data-object-type="shape"
        style="
          position: absolute;
          left: 100px;
          top: 60px;
          width: 60px;
          height: 4px;
          background-color: #fe2a80;
          border-radius: 2px;
          z-index: 1;
        "
      ></div>
      <!-- Title -->
      <div
        data-object="true"
        data-object-type="textbox"
        style="
          position: absolute;
          left: 100px;
          top: 90px;
          width: 1080px;
          height: 60px;
          z-index: 10;
        "
      >
        <p
          style="
            margin: 0;
            font-size: 40px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -1px;
          "
        >
          오늘의 목표
          <span
            style="
              color: #a1a1aa;
              font-weight: 400;
              font-size: 36px;
              padding-left: 12px;
            "
            >— 직접 만들고, 배포까지</span
          >
        </p>
      </div>
      <!-- Core Message Pre-text -->
      <div
        data-object="true"
        data-object-type="textbox"
        style="
          position: absolute;
          left: 140px;
          top: 240px;
          width: 1000px;
          height: 40px;
          z-index: 10;
        "
      >
        <p
          style="
            margin: 0;
            font-size: 24px;
            color: #a1a1aa;
            text-align: center;
            letter-spacing: -0.5px;
          "
        >
          코드를 직접 짜는 게 아니라 —
        </p>
      </div>
      <!-- Main Core Message -->
      <div
        data-object="true"
        data-object-type="textbox"
        style="
          position: absolute;
          left: 160px;
          top: 290px;
          width: 960px;
          height: 160px;
          z-index: 10;
        "
      >
        <p
          style="
            margin: 0;
            font-size: 56px;
            font-weight: 900;
            color: #ffffff;
            text-align: center;
            line-height: 1.4;
            letter-spacing: -2px;
          "
        >
          의도를 <span style="color: #fe2a80">말하고</span>, AI가
          <span style="color: #fe2a80">구현하고</span>, <br/>
          내가 <span style="color: #fe2a80">확인하는 루프</span>
        </p>
      </div>
      <!-- Left Bracket Accent for Core Message -->
      <div
        data-object="true"
        data-object-type="shape"
        style="
          position: absolute;
          left: 140px;
          top: 320px;
          width: 4px;
          height: 100px;
          background-color: #fe2a80;
          border-radius: 2px;
          z-index: 1;
        "
      ></div>
      <!-- Right Bracket Accent for Core Message -->
      <div
        data-object="true"
        data-object-type="shape"
        style="
          position: absolute;
          left: 1136px;
          top: 320px;
          width: 4px;
          height: 100px;
          background-color: #fe2a80;
          border-radius: 2px;
          z-index: 1;
        "
      ></div>
      <!-- Journey Label -->
      <div
        data-object="true"
        data-object-type="textbox"
        style="
          position: absolute;
          left: 140px;
          top: 500px;
          width: 1000px;
          height: 30px;
          z-index: 10;
        "
      >
        <p
          style="
            margin: 0;
            font-size: 16px;
            color: #666666;
            text-align: center;
            font-weight: 700;
            letter-spacing: 4px;
          "
        >
          TODAY'S JOURNEY
        </p>
      </div>
      <!-- Journey Step 1 Shape (Non-developer) -->
      <div
        data-object="true"
        data-object-type="shape"
        style="
          position: absolute;
          left: 220px;
          top: 550px;
          width: 360px;
          height: 100px;
          background-color: rgba(255, 255, 255, 0.03);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 16px;
          z-index: 1;
        "
      ></div>
      <!-- Journey Step 1 Text -->
      <div
        data-object="true"
        data-object-type="textbox"
        style="
          position: absolute;
          left: 220px;
          top: 550px;
          width: 360px;
          height: 100px;
          z-index: 10;
        "
      >
        <div
          style="
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
          "
        >
          <p
            style="margin: 0; font-size: 22px; color: #ffffff; font-weight: 500"
          >
            누구나 할 수 있는 방법
          </p>
          <p style="margin: 6px 0 0 0; font-size: 16px; color: #a1a1aa">
            (비개발자)
          </p>
        </div>
      </div>
      <!-- Journey Flow Arrow Icon -->
      <div
        data-object="true"
        data-object-type="icon"
        style="
          position: absolute;
          left: 610px;
          top: 585px;
          width: 60px;
          height: 30px;
          z-index: 10;
          display: flex;
          justify-content: center;
          align-items: center;
        "
      >
        <svg
          fill="none"
          height="28"
          stroke="#FE2A80"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2.5"
          viewbox="0 0 24 24"
          width="28"
        >
          <line x1="5" x2="19" y1="12" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </div>
      <!-- Journey Step 2 Shape (Developer) -->
      <div
        data-object="true"
        data-object-type="shape"
        style="
          position: absolute;
          left: 700px;
          top: 550px;
          width: 360px;
          height: 100px;
          background-color: rgba(254, 42, 128, 0.08);
          border: 1px solid rgba(254, 42, 128, 0.4);
          border-radius: 16px;
          z-index: 1;
        "
      ></div>
      <!-- Journey Step 2 Text -->
      <div
        data-object="true"
        data-object-type="textbox"
        style="
          position: absolute;
          left: 700px;
          top: 550px;
          width: 360px;
          height: 100px;
          z-index: 10;
        "
      >
        <div
          style="
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
          "
        >
          <p
            style="margin: 0; font-size: 22px; color: #ffffff; font-weight: 700"
          >
            개발자가 더 깊이 <span style="color: #fe2a80">가는 방법</span>
          </p>
        </div>
      </div>
      <!-- Bottom Right Tech Dot -->
      <div
        data-object="true"
        data-object-type="shape"
        style="
          position: absolute;
          left: 1240px;
          top: 680px;
          width: 6px;
          height: 6px;
          background-color: rgba(255, 255, 255, 0.2);
          border-radius: 50%;
          z-index: 1;
        "
      ></div>
    </div>
  </body>
</html>
